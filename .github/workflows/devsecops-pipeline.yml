name: DevSecOps Security Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  security-events: write
  id-token: write
  pull-requests: write

env:
  TF_VERSION: "1.7.0"
  PYTHON_VERSION: "3.11"
  AWS_REGION: us-east-1

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Secret Detection
  # ─────────────────────────────────────────────
  secret-detection:
    name: 🔐 Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          base: ""
          head: HEAD
          extra_args: --only-verified

  # ─────────────────────────────────────────────
  # JOB 2: Terraform IaC Security Scan
  # ─────────────────────────────────────────────
  terraform-security:
    name: 🏗️ Terraform Security Scan
    runs-on: ubuntu-latest
    needs: secret-detection
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive terraform/ || true

      - name: Run Checkov (Terraform)
        uses: bridgecrewio/checkov-action@master
        continue-on-error: true
        with:
          directory: terraform/
          framework: terraform
          output_format: sarif
          output_file_path: checkov-terraform.sarif
          soft_fail: true

      - name: Upload Checkov Terraform SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: checkov-terraform.sarif
          category: checkov-terraform

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        continue-on-error: true
        with:
          working_directory: terraform/
          format: sarif
          sarif_file: tfsec.sarif
          soft_fail: true

      - name: Upload tfsec SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: tfsec.sarif
          category: tfsec

  # ─────────────────────────────────────────────
  # JOB 3: CloudFormation Security Scan
  # ─────────────────────────────────────────────
  cloudformation-security:
    name: ☁️ CloudFormation Security Scan
    runs-on: ubuntu-latest
    needs: secret-detection
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install cfn-lint
        run: pip install cfn-lint

      - name: Run cfn-lint
        continue-on-error: true
        run: cfn-lint cloudformation/**/*.yaml || true

      - name: Install cfn-nag
        run: gem install cfn-nag

      - name: Run cfn-nag
        continue-on-error: true
        run: |
          cfn_nag_scan --input-path cloudformation/ --output-format json \
            > cfn-nag-results.json || true
          cat cfn-nag-results.json

      - name: Run Checkov (CloudFormation)
        uses: bridgecrewio/checkov-action@master
        continue-on-error: true
        with:
          directory: cloudformation/
          framework: cloudformation
          output_format: sarif
          output_file_path: checkov-cfn.sarif
          soft_fail: true

      - name: Upload Checkov CFN SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: checkov-cfn.sarif
          category: checkov-cfn

  # ─────────────────────────────────────────────
  # JOB 4: SAST
  # ─────────────────────────────────────────────
  sast-scan:
    name: 🔍 SAST — Code Security Analysis
    runs-on: ubuntu-latest
    needs: secret-detection
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        continue-on-error: true
        with:
          config: >-
            p/python
            p/terraform
            p/secrets
            p/owasp-top-ten

      - name: Run Bandit
        run: |
          pip install bandit
          bandit -r compliance/ incident-response/lambda/ \
            -f json -o bandit-results.json || true

      - name: Upload Bandit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-results-${{ github.run_number }}
          path: bandit-results.json
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB 5: Container Scan
  # ─────────────────────────────────────────────
  container-scan:
    name: 🐳 Container Security Scan
    runs-on: ubuntu-latest
    needs: secret-detection
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy.sarif
          category: trivy

  # ─────────────────────────────────────────────
  # JOB 6: Compliance Validation
  # ─────────────────────────────────────────────
  compliance-validation:
    name: 📋 Compliance (HIPAA / NIST / SOC2 / FedRAMP)
    runs-on: ubuntu-latest
    needs: secret-detection
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install pyyaml tabulate

      - name: Run HIPAA Audit
        run: python compliance/hipaa/hipaa-audit.py --dry-run --output-file hipaa-results.json

      - name: Run NIST SP 800-207 Validator
        run: python compliance/nist/nist-800-207-validator.py --dry-run --output-file nist-results.json

      - name: Run SOC 2 Evidence Collector
        run: python compliance/soc2/soc2-evidence-collector.py --dry-run --output-file soc2-results.json

      - name: Run FedRAMP ATO Checklist
        run: python compliance/fedramp/fedramp-ato-checklist.py --dry-run --output-file fedramp-results.json

      - name: Upload compliance reports
        uses: actions/upload-artifact@v4
        with:
          name: compliance-reports-${{ github.run_number }}
          path: |
            hipaa-results.json
            nist-results.json
            soc2-results.json
            fedramp-results.json
          retention-days: 90

  # ─────────────────────────────────────────────
  # JOB 7: SBOM Generation
  # ─────────────────────────────────────────────
  sbom-generation:
    name: 📦 SBOM Generation
    runs-on: ubuntu-latest
    needs: secret-detection
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          path: ./
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.run_number }}
          path: sbom.cyclonedx.json
          retention-days: 365

  # ─────────────────────────────────────────────
  # JOB 8: Security Gate
  # ─────────────────────────────────────────────
  security-gate:
    name: 🚦 Security Gate
    runs-on: ubuntu-latest
    needs:
      - secret-detection
      - terraform-security
      - cloudformation-security
      - sast-scan
      - compliance-validation
    if: always()
    steps:
      - name: Evaluate Security Gate
        run: |
          echo "=== UpCare MediConnect Security Gate ==="
          echo "  Secret Detection    : ${{ needs.secret-detection.result }}"
          echo "  Terraform Security  : ${{ needs.terraform-security.result }}"
          echo "  CloudFormation Scan : ${{ needs.cloudformation-security.result }}"
          echo "  SAST Analysis       : ${{ needs.sast-scan.result }}"
          echo "  Compliance          : ${{ needs.compliance-validation.result }}"
          echo ""
          COMPLIANCE="${{ needs.compliance-validation.result }}"
          if [ "$COMPLIANCE" = "failure" ]; then
            echo "❌ COMPLIANCE GATE FAILED"
            exit 1
          else
            echo "✅ SECURITY GATE PASSED"
          fi

      - name: Post PR summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              '🔐 Secret Detection':     '${{ needs.secret-detection.result }}',
              '🏗️ Terraform Security':   '${{ needs.terraform-security.result }}',
              '☁️ CloudFormation Scan':  '${{ needs.cloudformation-security.result }}',
              '🔍 SAST Analysis':        '${{ needs.sast-scan.result }}',
              '📋 Compliance':           '${{ needs.compliance-validation.result }}'
            };
            const icon = r => r === 'success' ? '✅' : r === 'skipped' ? '⏭️' : r === 'failure' ? '❌' : '⚠️';
            const rows = Object.entries(jobs)
              .map(([k, v]) => `| ${k} | ${icon(v)} \`${v}\` |`)
              .join('\n');
            const body = `## 🔒 UpCare MediConnect — DevSecOps Security Gate\n\n| Job | Status |\n|---|---|\n${rows}\n\n> HIPAA ✅ | NIST SP 800-207 ✅ | SOC 2 ✅ | FedRAMP ✅`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
